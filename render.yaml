services:
  - type: web
    name: creatorhub
    runtime: php
    buildCommand: "echo 'No build step required'"
    startCommand: "php -S 0.0.0.0:$PORT -t public public/router.php"
    envVars:
      - key: APP_ENV
        value: production
      - key: DB_HOST
        fromService:
          type: postgres
          name: creatorhub-db
          property: host
      - key: DB_USER
        fromService:
          type: postgres
          name: creatorhub-db
          property: user
      - key: DB_PASS
        fromService:
          type: postgres
          name: creatorhub-db
          property: password
      - key: DB_NAME
        fromService:
          type: postgres
          name: creatorhub-db
          property: database
      - key: URLROOT
        fromService:
          type: web
          name: creatorhub
          property: host
      - key: MPESA_CONSUMER_KEY
        fromSecret: mpesa_consumer_key
      - key: MPESA_CONSUMER_SECRET
        fromSecret: mpesa_consumer_secret

  - type: postgres
    name: creatorhub-db
    ipAllowList: []