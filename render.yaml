services:
  - type: web
    name: creatorhub
    runtime: php
    buildCommand: "echo 'No build step required'"
    startCommand: "php -S 0.0.0.0:$PORT -t public public/router.php"
    envVars:
      - key: APP_ENV
        value: production
      - key: DB_HOST
        fromDatabase: creatorhub-db
        property: host
      - key: DB_USER
        fromDatabase: creatorhub-db
        property: user
      - key: DB_PASS
        fromDatabase: creatorhub-db
        property: password
      - key: DB_NAME
        fromDatabase: creatorhub-db
        property: database
      - key: URLROOT
        fromService:
          type: web
          name: creatorhub
          property: host
      - key: MPESA_CONSUMER_KEY
        value: YOUR_MPESA_CONSUMER_KEY_HERE
      - key: MPESA_CONSUMER_SECRET
        value: YOUR_MPESA_CONSUMER_SECRET_HERE